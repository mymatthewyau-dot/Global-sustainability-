<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="shrimpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E55039;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="#FFF5F2" stroke="#E55039" stroke-width="2"/>
  <!-- Shrimp body -->
  <ellipse cx="100" cy="110" rx="45" ry="25" fill="url(#shrimpGradient)"/>
  <!-- Shrimp tail segments -->
  <ellipse cx="55" cy="115" rx="20" ry="12" fill="#FF8C69" transform="rotate(-15 55 115)"/>
  <ellipse cx="35" cy="120" rx="15" ry="10" fill="#FF7F6E" transform="rotate(-25 35 120)"/>
  <ellipse cx="20" cy="130" rx="12" ry="15" fill="#FF7F6E" transform="rotate(-45 20 130)"/>
  <!-- Tail fan -->
  <path d="M10 145 Q5 155 15 165 Q25 160 20 145 Z" fill="#E55039"/>
  <path d="M15 140 Q8 150 18 160 Q28 155 23 140 Z" fill="#FF8C69"/>
  <!-- Head/rostrum -->
  <ellipse cx="145" cy="100" rx="25" ry="22" fill="url(#shrimpGradient)"/>
  <path d="M165 95 L185 85 L175 95 L185 100 L165 100 Z" fill="#E55039"/>
  <!-- Eye -->
  <circle cx="155" cy="92" r="6" fill="#1a1a1a"/>
  <circle cx="157" cy="90" r="2" fill="white"/>
  <!-- Antennae -->
  <path d="M170 90 Q190 70 195 50" stroke="#E55039" stroke-width="2" fill="none"/>
  <path d="M168 88 Q185 60 190 35" stroke="#E55039" stroke-width="2" fill="none"/>
  <!-- Legs -->
  <line x1="85" y1="130" x2="80" y2="150" stroke="#E55039" stroke-width="2"/>
  <line x1="100" y1="132" x2="98" y2="155" stroke="#E55039" stroke-width="2"/>
  <line x1="115" y1="130" x2="118" y2="152" stroke="#E55039" stroke-width="2"/>
  <line x1="130" y1="125" x2="138" y2="145" stroke="#E55039" stroke-width="2"/>
  <!-- Label -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#E55039" font-weight="bold">P. vannamei</text>
</svg>

